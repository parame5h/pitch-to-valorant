<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pitch-to-Valorant</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
        :root {
            --void: #050608;
            --steel: #12151a;
            --steel-raised: #181c22;
            --line: #262b32;
            --signal: #ff4655;
            --ghost: #6b7280;
            --paper: #e7e3db;
            --sage-gold: #c9a15c;
            --jett-cyan: #5ce1e6;
            --viper-green: #8fce4a;
            --reyna-violet: #c04ecf;
            --sova-blue: #4a90c0;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--void);
            color: var(--paper);
            margin: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .font-display { font-family: 'Barlow Condensed', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .clip-tactical {
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
        }
        .clip-tactical-sm {
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
        }

        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #state-1, #state-2 {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 24px;
        }
        #state-1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #state-2 {
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 10;
        }

        body {
            position: relative;
        }

        #state-1 { transition: opacity 0.4s ease-out, transform 0.4s ease-out; }
        #state-2 { opacity: 0; pointer-events: none; transition: opacity 0.7s ease-in; }
        .state-transitioning #state-1 { opacity: 0; transform: translateY(-16px); pointer-events: none; }
        .state-transitioning #state-2 { opacity: 1; pointer-events: auto; }

        #pitch-input {
            resize: none;
            overflow-y: hidden;
            min-height: 60px;
            max-height: 240px;
        }

        .board {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 14px;
            height: 100%;
            padding: 14px;
        }

        .agent-card {
            background: var(--steel);
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            padding: 16px;
            min-height: 0;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .agent-card.active {
            border-color: var(--signal);
            animation: cardPulse 1.1s infinite;
        }
        @keyframes cardPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 70, 85, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(255, 70, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 70, 85, 0); }
        }

        .agent-card.resolved {
            background: var(--steel-raised);
        }

        .card-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            opacity: 0.3;
            filter: saturate(0.3);
            transition: all 0.5s ease-out;
        }
        .agent-card.active .card-icon,
        .agent-card.resolved .card-icon {
            opacity: 1;
            filter: saturate(1);
        }

        .card-score {
            margin-left: auto;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .agent-card.resolved .card-score { opacity: 1; transform: translateY(0); }

        .card-verdict {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.25;
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.4s ease 0.1s;
            flex-shrink: 0;
            max-height: 4.6em;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--line) transparent;
        }
        .agent-card.resolved .card-verdict { opacity: 1; }

        .card-reasoning {
            font-size: 0.8rem;
            line-height: 1.45;
            color: var(--ghost);
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.4s ease 0.2s;
            flex: 1;
            min-height: 0;
            padding-right: 4px;
        }
        .agent-card.resolved .card-reasoning { opacity: 1; }

        .card-reasoning, .sage-reasoning {
            scrollbar-width: thin;
            scrollbar-color: var(--line) transparent;
        }
        .card-reasoning::-webkit-scrollbar,
        .sage-reasoning::-webkit-scrollbar {
            width: 5px;
        }
        .card-reasoning::-webkit-scrollbar-track,
        .sage-reasoning::-webkit-scrollbar-track {
            background: transparent;
        }
        .card-reasoning::-webkit-scrollbar-thumb,
        .sage-reasoning::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 3px;
        }
        .card-reasoning::-webkit-scrollbar-thumb:hover,
        .sage-reasoning::-webkit-scrollbar-thumb:hover {
            background: var(--ghost);
        }

        .card-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ghost);
            margin-top: 8px;
            flex-shrink: 0;
        }

        .sage-console {
            background: radial-gradient(ellipse at center, #16130c 0%, var(--steel) 70%);
            border: 1px solid var(--sage-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px;
            overflow: hidden;
            grid-row: 1 / span 2;
            grid-column: 2;
        }

        .reticle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(201, 161, 92, 0.25);
            border-radius: 50%;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .r1 { width: 340px; height: 340px; }
        .r2 { width: 260px; height: 260px; border-style: dashed; }
        .r3 { width: 180px; height: 180px; }

        .sage-console.resolved .r1 { width: 300px; height: 300px; border-color: rgba(201, 161, 92, 0.5); }
        .sage-console.resolved .r2 { width: 220px; height: 220px; border-color: rgba(201, 161, 92, 0.7); animation: spin 12s linear infinite; }
        .sage-console.resolved .r3 { width: 150px; height: 150px; border-color: rgba(201, 161, 92, 0.9); }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .sage-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--sage-gold);
            z-index: 2;
            margin-bottom: 4px;
        }

        .sage-score {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 5.5rem;
            line-height: 1;
            color: var(--sage-gold);
            z-index: 2;
            opacity: 0;
            transform: scale(0.85);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sage-console.resolved .sage-score { opacity: 1; transform: scale(1); }

        .sage-of10 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--ghost);
            z-index: 2;
            margin-top: -6px;
            margin-bottom: 14px;
        }

        .sage-verdict {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            text-align: center;
            color: var(--paper);
            z-index: 2;
            max-width: 90%;
            opacity: 0;
            transition: opacity 0.5s ease 0.3s;
        }
        .sage-console.resolved .sage-verdict { opacity: 1; }

        .sage-reasoning {
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--ghost);
            text-align: center;
            max-width: 92%;
            margin-top: 12px;
            z-index: 2;
            max-height: 110px;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.5s ease 0.4s;
        }
        .sage-console.resolved .sage-reasoning { opacity: 1; }

        .sage-idle-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ghost);
            z-index: 2;
        }
        .sage-console.resolved .sage-idle-label { display: none; }

        .top-strip {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--line);
            background: var(--steel);
            flex-shrink: 0;
        }

        .error-banner { display: none; }
        .error-banner.show { display: flex; }

        .btn-primary {
            background: var(--signal);
            color: var(--void);
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover { filter: brightness(1.1); }

        /* ---- SCREEN CONTAINERS (previously relied on Tailwind, now plain CSS) ---- */
        .screen {
            position: absolute;
            inset: 0;
        }

        #state-1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 20;
        }

        #state-2 {
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
    </style>
</head>
<body>

<!-- STATE 1: Input -->
<div id="state-1">
  <div style="width: 100%; max-width: 640px;">
    <label class="font-mono" style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ghost);" for="pitch-input">
      Transmit your pitch for tactical review
    </label>
    <div style="position: relative; width: 100%; margin-top: 8px;">
      <div style="position: absolute; left: 16px; top: 16px; font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; z-index: 10; color: var(--signal);">&gt;</div>
      <textarea autocomplete="off" class="clip-tactical font-mono"
        style="width: 100%; background: var(--steel); border: 1px solid var(--line); color: var(--paper); font-size: 17px; padding: 16px 16px 16px 42px; outline: none;"
        id="pitch-input" placeholder="describe what you're building..." spellcheck="false" rows="1"></textarea>
      <div class="cursor-blink" style="position: absolute; right: 16px; bottom: 18px; width: 10px; height: 20px; background: var(--signal); pointer-events: none;" id="blink-cursor"></div>
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
      <span class="font-mono" style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ghost);">[shift+enter for new line]</span>
      <button id="submit-btn" class="font-mono clip-tactical-sm btn-primary" style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 22px;">
        Analyze &gt;
      </button>
    </div>
  </div>
</div>

<!-- STATE 2: Debrief board -->
<div id="state-2">
  <div class="top-strip">
    <span class="font-mono" style="font-size: 11px; color: var(--ghost); flex-shrink: 0; margin-right: 10px;">&gt;</span>
    <div class="font-mono" style="font-size: 12px; color: var(--paper); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" id="submitted-pitch-display"></div>
  </div>

  <div class="error-banner font-mono" style="padding: 8px 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; background: var(--void); border-bottom: 1px solid var(--signal); color: var(--signal);" id="error-banner">
    connection lost — retry transmission
  </div>

  <div class="board" style="flex: 1; min-height: 0;">
    <!-- Jett -->
    <div class="agent-card clip-tactical-sm" data-agent="jett" style="grid-column: 1; grid-row: 1;">
      <div class="card-head">
        <svg class="card-icon" viewBox="0 0 100 100"><polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#5ce1e6" stroke-width="4"/><path d="M50 25 L65 50 L50 75 L35 50 Z" fill="#5ce1e6" opacity="0.6"/></svg>
        <div class="font-display" style="font-size: 18px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--jett-cyan);">Jett</div>
        <div class="card-score" style="color: var(--jett-cyan);" data-score></div>
      </div>
      <div class="card-verdict" data-verdict></div>
      <div class="card-reasoning" data-reasoning></div>
      <div class="card-status" data-status>standby</div>
    </div>

    <!-- Viper -->
    <div class="agent-card clip-tactical-sm" data-agent="viper" style="grid-column: 3; grid-row: 1;">
      <div class="card-head">
        <svg class="card-icon" viewBox="0 0 100 100"><polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="#8fce4a" stroke-width="4"/><circle cx="50" cy="50" r="12" fill="#8fce4a" opacity="0.6"/></svg>
        <div class="font-display" style="font-size: 18px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--viper-green);">Viper</div>
        <div class="card-score" style="color: var(--viper-green);" data-score></div>
      </div>
      <div class="card-verdict" data-verdict></div>
      <div class="card-reasoning" data-reasoning></div>
      <div class="card-status" data-status>standby</div>
    </div>

    <!-- Sova -->
    <div class="agent-card clip-tactical-sm" data-agent="sova" style="grid-column: 1; grid-row: 2;">
      <div class="card-head">
        <svg class="card-icon" viewBox="0 0 100 100"><rect x="25" y="25" width="50" height="50" fill="none" stroke="#4a90c0" stroke-width="4" transform="rotate(45 50 50)"/><line x1="50" y1="18" x2="50" y2="82" stroke="#4a90c0" stroke-width="2"/><line x1="18" y1="50" x2="82" y2="50" stroke="#4a90c0" stroke-width="2"/></svg>
        <div class="font-display" style="font-size: 18px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--sova-blue);">Sova</div>
        <div class="card-score" style="color: var(--sova-blue);" data-score></div>
      </div>
      <div class="card-verdict" data-verdict></div>
      <div class="card-reasoning" data-reasoning></div>
      <div class="card-status" data-status>standby</div>
    </div>

    <!-- Reyna -->
    <div class="agent-card clip-tactical-sm" data-agent="reyna" style="grid-column: 3; grid-row: 2;">
      <div class="card-head">
        <svg class="card-icon" viewBox="0 0 100 100"><path d="M50 15 C70 15 85 35 85 55 C85 75 70 90 50 90 C30 90 15 75 15 55 C15 35 30 15 50 15 Z" fill="none" stroke="#c04ecf" stroke-width="4"/><circle cx="50" cy="55" r="13" fill="#c04ecf" opacity="0.6"/></svg>
        <div class="font-display" style="font-size: 18px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--reyna-violet);">Reyna</div>
        <div class="card-score" style="color: var(--reyna-violet);" data-score></div>
      </div>
      <div class="card-verdict" data-verdict></div>
      <div class="card-reasoning" data-reasoning></div>
      <div class="card-status" data-status>standby</div>
    </div>

    <!-- Sage console -->
    <div class="sage-console clip-tactical" data-agent="sage">
      <div class="reticle r1"></div>
      <div class="reticle r2"></div>
      <div class="reticle r3"></div>
      <div class="sage-idle-label" data-idle-label>awaiting full report</div>
      <div class="sage-label">lobby rating</div>
      <div class="sage-score" data-score></div>
      <div class="sage-of10 font-mono">/ 10</div>
      <div class="sage-verdict" data-verdict></div>
      <div class="sage-reasoning" data-reasoning></div>
    </div>
  </div>
</div>

<script>
    const API_ENDPOINT = "/analyze";

    const inputField = document.getElementById('pitch-input');
    const submitBtn = document.getElementById('submit-btn');
    const state1 = document.getElementById('state-1');
    const state2 = document.getElementById('state-2');
    const pitchDisplay = document.getElementById('submitted-pitch-display');
    const errorBanner = document.getElementById('error-banner');

    let resolvedCount = 0;

    inputField.addEventListener('input', () => {
        inputField.style.height = 'auto';
        inputField.style.height = Math.min(inputField.scrollHeight, 240) + 'px';
    });

    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            trySubmit();
        }
    });
    submitBtn.addEventListener('click', trySubmit);
    inputField.focus();

    function trySubmit() {
        const value = inputField.value.trim();
        if (value !== '') submitPitch(value);
    }

    function submitPitch(pitch) {
        pitchDisplay.textContent = `"${pitch}"`;
        document.body.classList.add('state-transitioning');
        errorBanner.classList.remove('show');
        resolvedCount = 0;

        setTimeout(() => {
            state1.style.display = 'none';
            document.querySelectorAll('.agent-card').forEach(c => {
                c.classList.add('active');
                c.querySelector('[data-status]').textContent = 'analyzing...';
            });
            streamAnalysis(pitch);
        }, 350);
    }

    function updateCard(agentName, payload) {
        if (agentName === 'sage') {
            const consoleEl = document.querySelector('.sage-console');
            consoleEl.classList.add('resolved');
            consoleEl.querySelector('[data-score]').textContent = payload.lobby_score != null ? payload.lobby_score : '—';
            consoleEl.querySelector('[data-verdict]').textContent = payload.verdict || '';
            consoleEl.querySelector('[data-reasoning]').textContent = payload.reasoning || '';
            return;
        }

        const card = document.querySelector(`.agent-card[data-agent="${agentName}"]`);
        if (!card) return;
        card.classList.remove('active');
        card.classList.add('resolved');
        card.querySelector('[data-score]').textContent = payload.score != null ? `${payload.score}/10` : '—';
        card.querySelector('[data-verdict]').textContent = payload.verdict || '';
        card.querySelector('[data-reasoning]').textContent = payload.reasoning || '';
        card.querySelector('[data-status]').textContent = 'verdict logged';
        resolvedCount++;
    }

    async function streamAnalysis(pitch) {
        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pitch })
            });

            if (!response.ok || !response.body) throw new Error('Bad response from server');

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                let boundary;
                while ((boundary = buffer.indexOf('\n\n')) !== -1) {
                    const rawEvent = buffer.slice(0, boundary);
                    buffer = buffer.slice(boundary + 2);

                    if (!rawEvent.startsWith('data:')) continue;
                    const jsonStr = rawEvent.replace(/^data:\s*/, '');

                    try {
                        const payload = JSON.parse(jsonStr);
                        const agentName = (payload.agent || '').toLowerCase();
                        if (agentName) updateCard(agentName, payload);
                    } catch (parseErr) {
                        console.error('Failed to parse SSE event:', parseErr, jsonStr);
                    }
                }
            }
        } catch (err) {
            console.error('Stream error:', err);
            errorBanner.classList.add('show');
        }
    }
</script>
</body></html>
